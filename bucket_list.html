<!DOCTYPE html> 
<html lang="ko"> 
<head> 
    <meta charset="UTF-8"> 
    <title>내 버킷리스트 카드</title>            
    <style> 
        /* 기본 카드 디자인 (자유롭게 수정 가능) */ 
        .card { 
            width: 300px; 
            margin: 50px auto; 
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%); 
            padding: 15px 15px 35px 15px; 
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15); 
            /* 배지의 기준점이 되기 위한 필수 속성 */ 
            position: relative;  
        } 
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; 
margin-bottom: 15px; } 
        .card h2 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 10px; } 
        .card p { color: #444; font-size: 1.1rem; line-height: 1.5; } 
        /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */ 
            badge.absolute { 
            position: absolute; 
            } 
        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */ 
            div.visibility:hover { 
            visibility: hidden; 
            position: absolute; 
            bottom: 10px; 
            left: 10px; 
            background-color: navy; 
            color: white; 
            padding: 5px 10px; 
            border-radius: 5px; 
            font-size: 0.9rem; 
        } 
    </style> 
</head> 
<body> 
    <div class="card"> 
        <h2>✨ 나의 꿈</h2> 
        <p>💪 1. 운동 열심히 하기</p> 
        <p>💻 2. 첫 웹사이트 배포하기</p> 
        </div> 
    <div style="position:relative;"> 
        <div style="position: absolute; top: -237px; left:1030px; background:linear
gradient(135deg, #fffcf0 0%, #fff3b0 100%);">        
            반드시!!🔥 
        </div> 
    </div> 
    <div style="position:relative;"> 
        <div style= "position:absolute; top: -90px; left:899px; color:black; 
padding:5px 20px; border-radius:5px; font-size:0.9rem;" class="visibility"> 
            끝까지 변함없이 포기하지말고! 
        </div> 
    </div> 
</body> 
</html>
